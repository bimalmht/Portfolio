<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Full Stack Developer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <nav>
        <div class="logo">
            <img src="./images/Logo.png" alt="Logo" class="logo-img">
        </div>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

<section id="home" class="hero">
    <div class="hero-container">
        <div class="hero-image">
            <img src="./images/Bimal Mahato.jpg" alt="Bimal Mahato">
            <div class="blob"></div> </div>

        <div class="hero-content">
            <p class="greeting">Welcome to my universe</p>
            <h1>Hi, I'm <span class="highlight">Bimal Mahato</span></h1>
            <p class="description">
                Building seamless digital experiences with <strong>Django</strong> backends 
                and <strong>React</strong> frontends. Data Architect by day, Full-Stack Creator by night.
            </p>
            
            <div class="hero-btns">
                <a href="#contact" class="btn">Hire Me</a>
                <a href="#projects" class="btn btn-outline">View Work</a>
            </div>

            <div class="social-links">
                <a href="https://www.linkedin.com/in/bimal-mahato-80a171117/" target="_blank">LinkedIn</a>
                <a href="https://github.com/bimalmht" target="_blank">GitHub</a>
                <a href="https://www.fiverr.com/bimalmht/buying?source=avatar_menu_profile" target="_blank">Fiverr</a>
            </div>
        </div>
    </div>
</section>

    <section id="contact" class="contact">
        <div class="container">
            <h2>Get In Touch</h2>
            <form class="contact-form">
                <input type="text" placeholder="Your Name" required>
                <input type="email" placeholder="Your Email" required>
                <textarea placeholder="Your Message" rows="5" required></textarea>
                <button type="submit" class="btn">Send Message</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Bimal Mahato.</p>
    </footer>

</body>
</html>
