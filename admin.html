<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Bimal Mahato</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center border-b border-slate-800 pb-6 mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-white">System Admin Console</h1>
                <p class="text-slate-400 mt-1">Manage database records and inbound inquiries.</p>
            </div>
            <!-- Passcode Gate -->
            <div>
                <input type="password" id="adminToken" placeholder="Enter Admin Passcode" 
                    class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-cyan-500 transition-colors w-64">
                <button onclick="loadDashboardData()" class="ml-2 bg-cyan-600 hover:bg-cyan-500 font-bold px-4 py-2 rounded-lg transition-colors text-white">Unlock</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left Side: Add Project Form -->
            <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-800">
                <h2 class="text-xl font-bold text-white mb-4">Add New Project</h2>
                <form id="projectForm" onsubmit="createNewProject(e)" class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Modal ID</label>
                        <input type="text" id="modalId" placeholder="e.g., ai-agent" required class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-cyan-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Image Path/URL</label>
                        <input type="text" id="imagePath" placeholder="e.g., ./images/ai-icon.png" required class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-cyan-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Category</label>
                        <input type="text" id="category" placeholder="e.g., Machine Learning" required class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-cyan-500">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Project Title</label>
                        <input type="text" id="title" placeholder="e.g., Autonomous Agent Framework" required class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-cyan-500">
                    </div>
                    <button type="submit" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold p-2.5 rounded-lg transition-colors mt-2">Publish to Portfolio</button>
                </form>
            </div>

            <!-- Right Side: Contact Form Messages Display -->
            <div class="lg:col-span-2 bg-slate-800/50 p-6 rounded-2xl border border-slate-800">
                <h2 class="text-xl font-bold text-white mb-4">Inbox Messages</h2>
                <div id="messagesContainer" class="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                    <p class="text-slate-500 italic">Enter your administrative passcode above to stream logs.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard Operations JavaScript -->
    <script>
        // Catch form preventDefault manually to handle standard submissions
        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = document.getElementById('adminToken').value;
            
            const payload = {
                modal_id: document.getElementById('modalId').value,
                image_path: document.getElementById('imagePath').value,
                category: document.getElementById('category').value,
                title: document.getElementById('title').value
            };

            try {
                const response = await fetch('/projects', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': token },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    alert('Project published successfully!');
                    document.getElementById('projectForm').reset();
                } else {
                    alert('Publishing failed: Check your token passcode.');
                }
            } catch (err) {
                console.error(err);
            }
        });

        async function loadDashboardData() {
            const token = document.getElementById('adminToken').value;
            const container = document.getElementById('messagesContainer');
            container.innerHTML = "<p class='text-cyan-500 animate-pulse'>Authenticating edge credentials...</p>";

            try {
                const response = await fetch('/messages', {
                    headers: { 'Authorization': token }
                });

                if (!response.ok) throw new Error('Unauthorized credentials');

                const messages = await response.json();
                container.innerHTML = messages.length === 0 ? "<p class='text-slate-500 italic'>No messages received yet.</p>" : "";

                messages.forEach(msg => {
                    container.innerHTML += `
                        <div class="bg-slate-800 border border-slate-700/60 p-4 rounded-xl shadow-sm">
                            <div class="flex justify-between items-start mb-2">
                                <span class="font-bold text-cyan-400 text-sm">${msg.name} <span class="text-slate-400 font-normal">(${msg.email})</span></span>
                                <span class="text-xs text-slate-500">${new Date(msg.created_at).toLocaleString()}</span>
                            </div>
                            <p class="text-slate-300 text-sm whitespace-pre-wrap">${msg.message}</p>
                        </div>
                    `;
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-400 bg-red-950/40 p-3 rounded-lg border border-red-900/50">Error: Invalid administrative token passcode.</p>`;
            }
        }
    </script>
</body>
</html>
